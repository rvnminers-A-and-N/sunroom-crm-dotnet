services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: sunroom-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD:?Set SA_PASSWORD in .env file}"
    ports:
      - "${SQL_PORT:-1433}:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    restart: unless-stopped

volumes:
  sqlserver-data:
