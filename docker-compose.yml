services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: sunroom-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD:?Set SA_PASSWORD in .env file}"
    ports:
      - "${SQL_PORT:-1433}:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools*/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1" || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  api:
    build: .
    container_name: sunroom-api
    ports:
      - "5236:5236"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=SunroomCrm;User Id=sa;Password=${SA_PASSWORD:?Set SA_PASSWORD in .env file};TrustServerCertificate=true"
      Jwt__Key: "SunroomCrmSuperSecretKeyThatIsAtLeast32Characters!"
      Jwt__Issuer: "SunroomCrm"
      Jwt__Audience: "SunroomCrmFrontend"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlserver-data:
